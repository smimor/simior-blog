name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: registry.cn-hangzhou.aliyuncs.com
  NAMESPACE: ${{ secrets.DOCKER_NAMESPACE }}

jobs:
  # ---- 后端构建 ----
  build-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: ./blog-server
        run: ./mvnw package -DskipTests -q -s .mvn/settings.xml

      - name: Build Docker image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/blog-server:${{ github.sha }} ./blog-server
          docker tag ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/blog-server:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/blog-server:latest

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/blog-server:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/blog-server:latest

  # ---- 前端管理后台构建 ----
  build-admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: ./blog-admin
        run: npm install --registry=https://registry.npmmirror.com

      - name: Build
        working-directory: ./blog-admin
        run: npm run build

      - name: Build Docker image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/blog-admin:${{ github.sha }} ./blog-admin
          docker tag ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/blog-admin:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/blog-admin:latest

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/blog-admin:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/blog-admin:latest

  # ---- 前台构建 ----
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: ./blog-web
        run: npm install --registry=https://registry.npmmirror.com

      - name: Build
        working-directory: ./blog-web
        run: npm run build

      - name: Build Docker image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/blog-web:${{ github.sha }} ./blog-web
          docker tag ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/blog-web:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/blog-web:latest

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/blog-web:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/blog-web:latest

  # ---- 部署到 VPS ----
  deploy:
    runs-on: ubuntu-latest
    needs: [build-server, build-admin, build-web]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/simior-blog
            git pull
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
