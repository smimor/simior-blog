name: Build and Deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: registry.cn-hangzhou.aliyuncs.com
  IMAGE_PREFIX: ${{ secrets.DOCKER_REGISTRY }}/simior-blog

jobs:
  # ---- 后端构建 ----
  build-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: ./blog-server
        run: ./mvnw package -DskipTests -q

      - name: Build Docker image
        if: github.event_name == 'push'
        working-directory: ./blog-server
        run: |
          docker build -t ${{ env.IMAGE_PREFIX }}-server:${{ github.sha }} .
          docker tag ${{ env.IMAGE_PREFIX }}-server:${{ github.sha }} ${{ env.IMAGE_PREFIX }}-server:latest

      - name: Login to Alibaba Cloud Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        if: github.event_name == 'push'
        run: |
          docker push ${{ env.IMAGE_PREFIX }}-server:${{ github.sha }}
          docker push ${{ env.IMAGE_PREFIX }}-server:latest

  # ---- 前端构建 ----
  build-admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Install dependencies
        working-directory: ./blog-admin
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: ./blog-admin
        run: pnpm lint
        continue-on-error: true

      - name: Build
        working-directory: ./blog-admin
        run: pnpm build

      - name: Build Docker image
        if: github.event_name == 'push'
        working-directory: ./blog-admin
        run: |
          docker build -t ${{ env.IMAGE_PREFIX }}-admin:${{ github.sha }} .
          docker tag ${{ env.IMAGE_PREFIX }}-admin:${{ github.sha }} ${{ env.IMAGE_PREFIX }}-admin:latest

      - name: Login to Alibaba Cloud Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        if: github.event_name == 'push'
        run: |
          docker push ${{ env.IMAGE_PREFIX }}-admin:${{ github.sha }}
          docker push ${{ env.IMAGE_PREFIX }}-admin:latest

  # ---- 部署到 VPS ----
  deploy:
    runs-on: ubuntu-latest
    needs: [build-server, build-admin]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/simior-blog
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
