# ============================================
# Gitee Go 自动部署流水线
#
# 触发条件：
#   - push 到 main 分支
#   - 手动触发
#
# 前置准备：
#   1. 在 Gitee Go 中创建主机组（如 "simior-blog"）
#   2. 在服务器上安装 Gitee Agent（参照 Gitee Go 帮助文档）
#   3. 将服务器加入主机组
#
# 使用方式：
#   推送代码到 main 分支后自动部署
# ============================================

name: simior-blog-deploy

# 触发条件
trigger:
  - branch:
      only:
        - main
    event:
      - push

# 任务编排
stages:
  - name: deploy
    displayName: 部署到服务器
    trigger: auto
    executor: []
    steps:
      - step: shell@agent
        name: deploy_to_server
        displayName: 部署到生产服务器
        # 目标主机组 ID（在 Gitee Go 中创建主机组后填入）
        hostGroupID: simior-blog
        script: |
          # ============================================
          # 自动部署脚本（在服务器上执行）
          # ============================================

          # 进入项目目录
          cd /opt/simior-blog

          # 拉取最新代码
          echo "拉取最新代码..."
          git pull origin main

          # 进入部署目录
          cd deploy

          # 生成 .env（如果不存在）
          if [ ! -f .env ]; then
            echo "生成配置文件..."
            cp .env.example .env
          fi

          # 生成 blog-web 环境变量
          cat > ../blog-web/.env << 'ENVEOF'
          NEXT_PUBLIC_API_URL=/api
          NEXT_PUBLIC_SITE_NAME=Simior Blog
          ENVEOF

          cat > ../blog-web/.env.production << 'ENVEOF'
          NEXT_PUBLIC_API_URL=/api
          NEXT_PUBLIC_SITE_NAME=Simior Blog
          ENVEOF

          # 进入 docker 目录
          cd docker

          # 构建并启动所有服务
          echo "构建并启动服务..."
          docker compose up -d --build

          # 等待服务启动
          echo "等待服务启动..."
          sleep 30

          # 检查服务状态
          echo "服务状态："
          docker compose ps

          echo ""
          echo "部署完成！"
