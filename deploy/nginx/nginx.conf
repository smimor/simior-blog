# ============================================
# Nginx 反向代理主配置
#
# 作用：所有外部请求先经过 Nginx，再根据 URL 路径转发到对应服务
#
# 请求流程：
#   浏览器 → Nginx(:80) → blog-web(:3000)    [访问 /]
#   浏览器 → Nginx(:80) → blog-admin(:80)    [访问 /admin]
#   浏览器 → Nginx(:80) → blog-server(:8080) [访问 /api/]
# ============================================

# 自动检测 CPU 核心数，设置 worker 进程数量
worker_processes auto;

# 事件模块：定义每个 worker 进程能处理多少连接
events {
    worker_connections 1024;
}

http {
    # 隐藏 Nginx 版本号
    server_tokens off;

    # 引入 MIME 类型映射（告诉浏览器 .js 是 JavaScript，.css 是样式表等）
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 启用 sendfile：直接在内核态传输文件，不需要经过用户态，更快
    sendfile    on;
    # TCP 优化
    tcp_nopush  on;
    tcp_nodelay on;
    keepalive_timeout  65;

    # ==========================================
    # Gzip 压缩：把响应内容压缩后再发送，减少传输体积
    # ==========================================
    gzip on;                      # 启用压缩
    gzip_vary on;                 # 在响应头添加 Vary: Accept-Encoding
    gzip_proxied any;             # 对所有代理请求都压缩
    gzip_comp_level 6;            # 压缩级别（1-9，6 是性价比最高的）
    gzip_min_length 1024;         # 小于 1KB 的文件不压缩
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # ==========================================
    # Upstream 定义：给后端服务组起个名字
    # 后面 location 里直接用名字引用，不用每次都写地址
    # ==========================================
    upstream web_upstream {
        server blog-web:3000;        # Next.js 前台
    }

    upstream admin_upstream {
        server blog-admin:80;        # Vue 管理后台
    }

    upstream api_upstream {
        server blog-server:8080;     # Spring Boot 后端
    }

    # ==========================================
    # WebSocket 条件映射：只有 Upgrade 头非空时才设置 upgrade
    # 避免普通 HTTP 请求也被设置 Connection: upgrade
    # ==========================================
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;                   # 监听 80 端口
        server_name _;               # 匹配所有域名

        # 上传文件大小限制（与 application.yml 中的 max-file-size 一致）
        client_max_body_size 50m;

        # ==========================================
        # 安全响应头
        # ==========================================
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: http: https:;" always;

        # ==========================================
        # /ws/ → 后端 WebSocket
        # Spring Boot WebSocket 端点：/ws/{sid}
        # ==========================================
        location /ws/ {
            proxy_pass http://api_upstream/ws/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # WebSocket 必需头
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ==========================================
        # /api/ → 后端 API
        # 末尾的 / 很重要：会去除 /api 前缀
        # 例如：/api/articles → /articles
        # ==========================================
        location /api/ {
            proxy_pass http://api_upstream/api/;
            # 传递客户端真实信息到后端
            proxy_set_header Host $host;                    # 原始域名
            proxy_set_header X-Real-IP $remote_addr;        # 客户端真实 IP
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # 代理链
            proxy_set_header X-Forwarded-Proto $scheme;     # http 还是 https
            # 超时设置
            proxy_connect_timeout 30s;   # 连接后端超时
            proxy_send_timeout 60s;      # 发送请求超时
            proxy_read_timeout 120s;     # 等待后端响应超时（上传大文件需要久一点）
        }

        # ==========================================
        # /admin → Vue 管理后台
        # 末尾的 / 去除 /admin 前缀
        # ==========================================
        location /admin/ {
            proxy_pass http://admin_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 访问 /admin（没有斜杠）时，自动跳转到 /admin/
        location = /admin {
            return 301 /admin/;
        }

        # ==========================================
        # / → Next.js 前台（默认）
        # ==========================================
        location / {
            proxy_pass http://web_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ==========================================
        # 安全：禁止访问以 . 开头的隐藏文件
        # 例如：.env、.git 等敏感文件
        # ==========================================
        location ~ /\. {
            deny all;
        }
    }
}
