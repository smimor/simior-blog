# ============================================
# blog-admin 内部 Nginx 配置
#
# 作用：blog-admin 容器内部的 Nginx，托管 Vue 打包后的静态文件
#
# 注意：这不是反向代理，只是静态文件服务器
# 反向代理由外层的 nginx.conf 统一处理
# ==========================================

server {
    listen 80;
    server_name localhost;

    # 启用 Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # 静态文件根目录（Vue 打包后的 dist 目录）
    root /usr/share/nginx/html;
    index index.html;

    # SPA 路由 fallback：
    # Vue 是单页应用，所有页面都由 index.html 渲染
    # 访问 /user/list 时，Nginx 找不到这个文件，就返回 index.html
    # 让 Vue Router 接管路由
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite 构建的静态资源带 hash（如 /assets/index.a1b2c3.js）
    # hash 变了就是新版本，可以长期缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }
}
