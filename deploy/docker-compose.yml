# ============================================
# simior-blog Docker Compose 编排
# 包含：MySQL、Redis、MinIO、后端、管理后台、前台、Nginx
# 使用方式：docker compose up -d
# ============================================

services:
  # ---- MySQL 数据库 ----
  mysql:
    image: mysql:8.0
    container_name: simior-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: simior-blog
      MYSQL_CHARSET: utf8mb4
    volumes:
      - mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - simior-net

  # ---- Redis 缓存 ----
  redis:
    image: redis:7-alpine
    container_name: simior-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - simior-net

  # ---- MinIO 对象存储 ----
  minio:
    image: minio/minio:latest
    container_name: simior-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-password123456}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - simior-net

  # ---- 后端服务 ----
  blog-server:
    build: ../blog-server
    container_name: simior-server
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-admin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-password123456}
      OSS_ENDPOINT: ${OSS_ENDPOINT:-}
      OSS_ACCESS_KEY: ${OSS_ACCESS_KEY:-}
      OSS_SECRET_KEY: ${OSS_SECRET_KEY:-}
      OSS_BUCKET_NAME: ${OSS_BUCKET_NAME:-}
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - simior-net

  # ---- 前端管理后台 ----
  blog-admin:
    build: ../blog-admin
    container_name: simior-admin
    restart: unless-stopped
    depends_on:
      - blog-server
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - simior-net

  # ---- 前台（Next.js）----
  blog-web:
    build: ../blog-web
    container_name: simior-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: /api
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - simior-net

  # ---- Nginx 反向代理 ----
  nginx:
    image: nginx:alpine
    container_name: simior-nginx
    restart: unless-stopped
    depends_on:
      - blog-server
      - blog-admin
      - blog-web
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx-html:/usr/share/nginx/html
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - simior-net

volumes:
  mysql-data:
  redis-data:
  minio-data:
  nginx-html:

networks:
  simior-net:
    driver: bridge
